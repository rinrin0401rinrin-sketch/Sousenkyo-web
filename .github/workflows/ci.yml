name: CI

on:
  pull_request:
  push:
    branches:
      - main
      - master
      - codex/**
  workflow_dispatch:
    inputs:
      run_release_check:
        description: Run strict release gate and preview smoke
        required: false
        default: "false"
      election_id:
        description: Election ID for release check
        required: false
        default: shugiin-50th

jobs:
  validate:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Node
        uses: actions/setup-node@v4
        with:
          node-version: 22
          cache: npm

      - name: Install dependencies
        run: npm ci

      - name: Syntax check validation scripts
        run: |
          node --check scripts/validate-data.mjs
          node --check scripts/release-check.mjs
          node --check scripts/fetch-official-data.mjs
          node --check scripts/test-fetch-official-data.mjs
          node --check scripts/validate-official-pipeline-inputs.mjs
          node --check scripts/smoke-preview.mjs

      - name: Fetcher security tests
        run: npm run test:fetch:official

      - name: Scan for secrets
        run: npm run scan:secrets

      - name: Validate materials strictly
        run: npm run validate:materials:strict

      - name: Validate data strictly
        run: npm run validate:data:strict

      - name: Build
        run: npm run build

  release-check:
    if: github.event_name == 'workflow_dispatch' && github.event.inputs.run_release_check == 'true'
    runs-on: ubuntu-latest

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Node
        uses: actions/setup-node@v4
        with:
          node-version: 22
          cache: npm

      - name: Install dependencies
        run: npm ci

      - name: Release check
        env:
          ELECTION_ID: ${{ github.event.inputs.election_id }}
        run: npm run release:check -- "$ELECTION_ID"
